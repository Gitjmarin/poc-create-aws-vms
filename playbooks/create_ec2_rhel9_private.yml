---
- name: Create private RHEL 9 EC2 VM from AAP Execution Node
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-1

    subnet_id: subnet-0dce8b078af68d183
    security_group_id: sg-07b67bf25cbd945cf

    instance_name: hwc-aap-poc-node-p10
    instance_type: t2.micro

    # AWS Key Pair
    key_name: new-key-pair-aws-hwc-app-poc

    # SSH
    ssh_user: ec2-user
    ssh_private_key_path: /root/.ssh/id_ed25519

  tasks:

    #######################################################################
    # Verify instance does not already exist
    #######################################################################

    - name: Search existing EC2 instance
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
          instance-state-name:
            - pending
            - running
            - stopping
            - stopped
      register: existing_instance

    - name: Stop if instance already exists
      ansible.builtin.meta: end_play
      when: existing_instance.instances | length > 0

    #######################################################################
    # Find latest official RHEL 9 AMI
    #######################################################################

    - name: Find latest official RHEL 9 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners:
          - "309956199498"
        filters:
          name: "RHEL-9*_HVM-*-x86_64-*"
          architecture: x86_64
          virtualization-type: hvm
          root-device-type: ebs
          state: available
      register: rhel9_amis

    - name: Fail if no RHEL AMI found
      ansible.builtin.fail:
        msg: No official RHEL 9 AMI found.
      when: rhel9_amis.images | length == 0

    - name: Select newest AMI
      ansible.builtin.set_fact:
        latest_ami: "{{ (rhel9_amis.images | sort(attribute='creation_date'))[-1] }}"

    - name: Show selected AMI
      ansible.builtin.debug:
        msg:
          - "AMI: {{ latest_ami.image_id }}"
          - "Name: {{ latest_ami.name }}"
          - "Created: {{ latest_ami.creation_date }}"

    #######################################################################
    # Create EC2
    #######################################################################

    - name: Create EC2
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        name: "{{ instance_name }}"
        image_id: "{{ latest_ami.image_id }}"
        instance_type: "{{ instance_type }}"
        key_name: "{{ key_name }}"
        vpc_subnet_id: "{{ subnet_id }}"
        security_group: "{{ security_group_id }}"

        network_interfaces:
          - device_index: 0
            subnet_id: "{{ subnet_id }}"
            groups:
              - "{{ security_group_id }}"
            assign_public_ip: false

        wait: true
        wait_timeout: 600

        exact_count: 1

        filters:
          "tag:Name": "{{ instance_name }}"
          instance-state-name:
            - pending
            - running
            - stopping
            - stopped

        tags:
          Name: "{{ instance_name }}"
          Owner: TI

      register: ec2_create

    #######################################################################
    # Wait until Running
    #######################################################################

    - name: Wait until instance is Running
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ instance_name }}"
      register: ec2_info
      retries: 60
      delay: 5
      until:
        - ec2_info.instances | length > 0
        - ec2_info.instances[0].state.name == "running"

    #######################################################################
    # Obtain private IP
    #######################################################################

    - name: Save private IP
      ansible.builtin.set_fact:
        instance_private_ip: "{{ ec2_info.instances[0].private_ip_address }}"

    - name: Show private IP
      ansible.builtin.debug:
        msg: "Private IP: {{ instance_private_ip }}"

    #######################################################################
    # Wait for SSH
    #######################################################################

    - name: Wait for SSH port
      ansible.builtin.wait_for:
        host: "{{ instance_private_ip }}"
        port: 22
        timeout: 300
        delay: 10

    #######################################################################
    # Validate SSH
    #######################################################################

    - name: Validate SSH access
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key_path }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - "{{ ssh_user }}@{{ instance_private_ip }}"
          - hostname
      register: ssh_test
      changed_when: false

    - name: Show SSH result
      ansible.builtin.debug:
        msg:
          - "SSH validation successful."
          - "Hostname: {{ ssh_test.stdout }}"

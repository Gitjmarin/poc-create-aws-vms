---
# ============================================================================
# Post-provisión: conecta por SSH al host recién creado (registrado en la
# POC-Inventory por el playbook de creación) y averigua únicamente:
#   - hostname
#   - uptime
#
# Diseñado para el Escenario B (AAP-native):
#   - Es un Job Template independiente que apunta a la POC-Inventory.
#   - La autenticación SSH la provee una MACHINE CREDENTIAL adjunta al Job
#     Template. La llave privada NO va en el playbook: AAP la inyecta en el
#     Execution Environment vía ssh-agent en tiempo de ejecución.
#   - El execution node está dentro de la VPC, así que conecta por la IP
#     privada con la que el host quedó registrado (ansible_host).
#
# Uso recomendado en un Workflow:
#   Job 1 (crear + registrar en POC-Inventory)  ->  Job 2 (este playbook)
#   En el Job 2, usa "Limit" = nombre de la instancia para acotar el alcance,
#   o pasa target_hosts como extra var (por defecto: lnx-hwc-aap-poc-node-p10).
# ============================================================================
- name: Get hostname and uptime from newly created host
  hosts: "{{ target_hosts | default('lnx-hwc-aap-poc-node-p10') }}"
  gather_facts: false

  vars:
    # Acepta la host key desconocida de un servidor nuevo sin fallar,
    # pero la fija tras el primer contacto (más seguro que desactivar el check).
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

    # Tiempo máximo de espera a que sshd acepte conexiones (segundos).
    ssh_ready_timeout: 300

    # NOTA: rhsm_org_id y rhsm_activation_key NO se definen aquí.
    # Los inyecta una Credential de AAP (Custom Credential Type
    # "Red Hat Subscription (Activation Key)") como extra vars.
    # Fuera de AAP, pásalos con -e o vía Ansible Vault.

  tasks:

    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: "{{ ssh_ready_timeout }}"

    - name: Ensure RHSM credentials were provided
      ansible.builtin.assert:
        that:
          - rhsm_org_id is defined and rhsm_org_id | length > 0
          - rhsm_activation_key is defined and rhsm_activation_key | length > 0
        fail_msg: >-
          Faltan rhsm_org_id / rhsm_activation_key. Adjunta la credencial
          RHSM al Job Template (o pásalos con -e / Vault).

    - name: Register system with Red Hat Subscription Manager
      become: true
      ansible.builtin.command: >-
        subscription-manager register
        --org="{{ rhsm_org_id }}"
        --activationkey="{{ rhsm_activation_key }}"
      register: rhsm_reg
      changed_when: "'already registered' not in (rhsm_reg.stdout + rhsm_reg.stderr)"
      failed_when: >-
        rhsm_reg.rc != 0
        and 'already registered' not in (rhsm_reg.stdout + rhsm_reg.stderr)

    - name: Get hostname
      ansible.builtin.command: hostname
      register: hostname_result
      changed_when: false

    - name: Get uptime
      ansible.builtin.command: uptime
      register: uptime_result
      changed_when: false

    - name: Get OS version from /etc/redhat-release
      ansible.builtin.command: cat /etc/redhat-release
      register: os_release_result
      changed_when: false

    - name: Show hostname, uptime and OS version
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Host inventario : {{ inventory_hostname }}  ({{ ansible_host | default('N/A') }})"
          - "Hostname        : {{ hostname_result.stdout }}"
          - "Uptime          : {{ uptime_result.stdout }}"
          - "OS Version      : {{ os_release_result.stdout }}"
          - "=========================================="
